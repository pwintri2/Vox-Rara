<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Aanmelden | Wintrip</title>

<link rel="stylesheet" href="/assets/style.css?v=2">
<link rel="stylesheet" href="/leden/leden.css?v=1">

<style>

/* =========================
   MASTER FADE (zelfde timing als boekons)
========================= */

body{
  opacity:0;
  transform: translateY(12px);
  transition: opacity 1.4s ease, transform 1.4s ease;
}

body.loaded{
  opacity:1;
  transform: translateY(0);
}

/* =========================
   FLUWEEL ACHTERGROND
========================= */

body{
  background:
    radial-gradient(circle at 20% 20%, rgba(30,40,60,0.35), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(20,30,50,0.25), transparent 40%),
    #06080f;
  color:#e6e6ea;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  margin:0;
  letter-spacing:0.2px;
  position:relative;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  opacity:0.035;
  background-image:
    repeating-linear-gradient(
      0deg,
      rgba(255,255,255,0.3) 0px,
      rgba(255,255,255,0.3) 1px,
      transparent 1px,
      transparent 2px
    );
  mix-blend-mode:overlay;
}

/* =========================
   TOPBAR
========================= */

.topbar{
  display:flex;
  align-items:center;
  padding:26px 60px;
  border-bottom:1px solid rgba(212,175,55,0.25);
  background:rgba(6,8,14,0.8);
  backdrop-filter: blur(14px);
}

.logo{
  height:36px;
  margin-right:22px;
  opacity:0.9;
}

.title{
  font-size:17px;
  font-weight:500;
  letter-spacing:1.5px;
  text-transform:uppercase;
  opacity:0.75;
}

/* =========================
   LAYOUT
========================= */

.container{
  display:flex;
  justify-content:center;
  padding:110px 20px;
}

.card{
  width:100%;
  max-width:820px;
  background:linear-gradient(160deg,#0e111a,#0a0d15);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:30px;
  padding:65px;
  box-shadow:
    0 70px 160px rgba(0,0,0,0.95),
    inset 0 0 0 1px rgba(255,255,255,0.02);
  position:relative;

  /* entrance animation */
  opacity:0;
  transform:translateY(30px);
  transition: all 1.2s cubic-bezier(.19,1,.22,1);
}

/* active state na load */
body.loaded .card{
  opacity:1;
  transform:translateY(0);
}

/* gouden hairline */
.card::before{
  content:"";
  position:absolute;
  top:0;
  left:40px;
  right:40px;
  height:1px;
  background:linear-gradient(to right, transparent, rgba(212,175,55,0.5), transparent);
  opacity:0;
  transition:opacity 1.8s ease;
}

/* shimmer effect bij load */
body.loaded .card::before{
  opacity:1;
}

.card:hover{
  transform: translateY(-5px);
  box-shadow:
    0 90px 200px rgba(0,0,0,1),
    inset 0 0 0 1px rgba(255,255,255,0.05);
}

.cardTitle{
  font-size:34px;
  font-weight:500;
  margin-bottom:45px;
  text-align:center;
  letter-spacing:0.5px;
}

/* =========================
   FORM
========================= */

label{
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:1.4px;
  opacity:0.45;
}

input, select, textarea{
  width:100%;
  padding:17px;
  margin-top:8px;
  margin-bottom:28px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.03);
  color:#f5f5f7;
  font-size:14px;
  transition: all 0.3s ease;
}

input:hover, select:hover, textarea:hover{
  border-color:rgba(212,175,55,0.25);
}

input:focus, select:focus, textarea:focus{
  outline:none;
  border-color:rgba(212,175,55,0.45);
  background:rgba(255,255,255,0.05);
  box-shadow:0 0 0 4px rgba(212,175,55,0.08);
}

.btn.primary{
  padding:20px 30px;
  border-radius:22px;
  background:linear-gradient(to right,#f5f5f5,#dadada);
  color:#000;
  font-weight:600;
  letter-spacing:0.5px;
  transition: all 0.4s ease;
}

.btn.primary:hover{
  transform: translateY(-4px);
  box-shadow:0 25px 50px rgba(212,175,55,0.15);
}

.small{
  opacity:0.6;
  font-size:13px;
}

@media(max-width:768px){
  .card{ padding:40px; }
}

</style>
</head>
<body>

<header class="topbar">
  <img src="/assets/logo.png" class="logo" alt="Wintrip logo">
  <div class="title">Aanmelden</div>
</header>

<main class="container">
  <div class="card">
    <div class="cardTitle">Aanmelden</div>

    <label>Naam</label>
    <input id="naam" type="text" placeholder="Jouw naam">

    <label>E-mail</label>
    <input id="email" type="email" placeholder="jij@voorbeeld.nl">

    <label>Vertel iets over jezelf</label>
    <textarea id="over" rows="6" placeholder="Zangervaring, motivatie, beschikbaarheid…"></textarea>

    <label>Stemsoort</label>
    <select id="stem">
      <option value="">Kies…</option>
      <option>Sopraan</option>
      <option>Alt</option>
      <option>Tenor</option>
      <option>Bas</option>
    </select>

    <label>Foto</label>
    <input id="foto" type="file" accept="image/*">

    <label>Curriculum vitae en ingezongen geluidsfragment (optioneel)</label>
    <input id="bestanden" type="file" multiple>

    <div class="modalBtns" style="justify-content:flex-end; margin-top:20px;">
      <button id="sendBtn" class="btn primary">Verzenden</button>
    </div>

    <div id="msg" class="small" style="margin-top:15px;"></div>
  </div>
</main>

<script>
window.addEventListener("load", function(){
  document.body.classList.add("loaded");
});
</script>

<script>
  const msg = document.getElementById("msg");

  document.getElementById("sendBtn").addEventListener("click", async () => {
    msg.textContent = "";
    const fd = new FormData();
    fd.append("naam", document.getElementById("naam").value.trim());
    fd.append("email", document.getElementById("email").value.trim());
    fd.append("over", document.getElementById("over").value.trim());
    fd.append("stem", document.getElementById("stem").value);

    const foto = document.getElementById("foto").files[0];
    if (foto) fd.append("foto", foto);

    const files = Array.from(document.getElementById("bestanden").files || []);
    files.forEach(f => fd.append("bestanden", f));

    if (!fd.get("naam") || !fd.get("email")) {
      msg.textContent = "Naam en e-mail zijn verplicht.";
      return;
    }

    try {
      const res = await fetch("api.php?action=ledenAanmelden", { method:"POST", body: fd });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);

      if (data.mail_error) {
        msg.textContent = "Aanmelding opgeslagen, maar mailen lukte nog niet.";
      } else {
        msg.textContent = "Verzonden! Dankjewel 🙂";
      }

      ["naam","email","over"].forEach(id => document.getElementById(id).value = "");
      document.getElementById("stem").value = "";
      document.getElementById("foto").value = "";
      document.getElementById("bestanden").value = "";
    } catch(err) {
      msg.textContent = err.message || String(err);
    }
  });
</script>

</body>
</html>
