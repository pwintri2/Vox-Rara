<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wintrip</title>
<link rel="icon" type="image/png" href="logo.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    min-height:100vh;
    background:url("vox-rara-wintrip-projects_files/designer-13-standard.png") no-repeat center center/cover;
    color:white;
    overflow-x:hidden;
    position:relative;
    animation:bgZoom 40s ease-in-out infinite alternate;
}

/* Background zoom */
@keyframes bgZoom{
    from{background-size:100%;}
    to{background-size:110%;}
}

/* Cinematic overlay */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at 50% 40%, rgba(255,255,255,0.08), transparent 60%),
        radial-gradient(circle at 50% 80%, rgba(0,0,0,0.7), rgba(0,0,0,0.95));
    backdrop-filter:blur(14px);
    z-index:0;
}

/* Floating motion */
@keyframes floatSlow{
    0%{transform:translateY(0px);}
    50%{transform:translateY(-8px);}
    100%{transform:translateY(0px);}
}

/* Dynamic light */
.light{
    position:fixed;
    width:800px;
    height:800px;
    pointer-events:none;
    background:radial-gradient(circle, rgba(255,255,255,0.2), transparent 70%);
    transform:translate(-50%,-50%);
    z-index:1;
}

/* Particles */
canvas{
    position:fixed;
    inset:0;
    z-index:1;
    pointer-events:none;
}

/* Intro */
.intro{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
    animation:introFade 1.2s ease forwards 3s;
}

.intro img{
    width:160px;
    opacity:0;
    transform:scale(.8);
    animation:logoReveal 1.8s cubic-bezier(.16,1,.3,1) forwards;
}

/* Shimmer sweep */
.intro img::after{
    content:"";
}

@keyframes logoReveal{
    to{opacity:1;transform:scale(1);}
}

@keyframes introFade{
    to{opacity:0;visibility:hidden;}
}

/* Header */
header{
    position:relative;
    z-index:2;
    padding:40px 70px;
    opacity:0;
    transform:translateY(-30px);
    animation:reveal 1.2s ease forwards 3.2s;
}

.logo{
    height:60px;
    position:relative;
    overflow:hidden;
}

/* Logo shimmer */
.logo::after{
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:50%;
    height:100%;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,.6),transparent);
    animation:logoShimmer 3s ease forwards 4s;
}

@keyframes logoShimmer{
    to{left:150%;}
}

/* Layout */
.container{
    position:relative;
    z-index:2;
    max-width:1200px;
    margin:auto;
    padding:40px 30px 120px;
    text-align:center;
}

.welcome-img{
    width:260px;
    border-radius:28px;
    margin-bottom:60px;
    box-shadow:0 70px 150px rgba(0,0,0,.85);
    opacity:0;
    transform:translateY(60px);
    animation:reveal 1.4s ease forwards 3.4s;
}

.title{
    font-size:30px;
    margin-bottom:70px;
    letter-spacing:.4px;
    opacity:0;
    transform:translateY(60px);
    animation:reveal 1.4s ease forwards 3.6s;
}

/* Tiles */
.tiles{
    display:flex;
    justify-content:center;
    gap:60px;
    flex-wrap:wrap;
}

.tile{
    position:relative;
    width:340px;
    padding:60px 40px;
    border-radius:34px;
    text-decoration:none;
    color:white;
    overflow:hidden;

    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(40px);
    border:1px solid rgba(255,255,255,0.3);

    box-shadow:
        0 70px 160px rgba(0,0,0,1),
        inset 0 1px 0 rgba(255,255,255,0.3);

    transition:transform .4s ease, box-shadow .4s ease;
    transform-style:preserve-3d;

    opacity:0;
    transform:translateY(80px);
    animation:
        reveal 1.6s ease forwards 3.8s,
        floatSlow 6s ease-in-out infinite 6s;
}

.tile::after{
    content:"";
    position:absolute;
    top:0;left:0;
    width:100%;height:3px;
    background:linear-gradient(to right,#d4af37,#f6e08a);
}

.tile::before{
    content:"";
    position:absolute;
    top:-50%;
    left:-70%;
    width:60%;
    height:200%;
    background:linear-gradient(120deg,
        rgba(255,255,255,0) 0%,
        rgba(255,255,255,0.25) 50%,
        rgba(255,255,255,0) 100%);
    transform:rotate(25deg);
    animation:sweep 10s infinite ease-in-out;
}

.icon{
    width:64px;
    margin-bottom:30px;
    fill:#f6e08a;
}

.tile-title{
    font-size:21px;
    font-weight:600;
}

/* Animations */
@keyframes reveal{
    to{opacity:1;transform:translateY(0);}
}

@keyframes sweep{
    0%{left:-70%;}
    50%{left:130%;}
    100%{left:130%;}
}

/* Responsive */
@media(max-width:900px){
    .tiles{flex-direction:column;align-items:center;gap:40px;}
}
</style>
</head>

<body>

<div class="intro">
    <img src="logo.png">
</div>

<div class="light" id="light"></div>
<canvas id="particles"></canvas>

<header>
    <img src="logo.png" class="logo">
</header>

<div class="container">

    <img src="Portal/36e40ae1-f61b-4ef6-b480-5ce96bb00b77.png"
         class="welcome-img">

    <div class="title">
        Welkom bij Vox Rara
    </div>

    <div class="tiles">

        <a href="vox-rara-wintrip-projects.htm" class="tile">
            <svg class="icon" viewBox="0 0 24 24">
                <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/>
            </svg>
            <div class="tile-title">Vox Rara</div>
        </a>

        <a href="Stage/aanmelden-stagiair.html" class="tile">
            <svg class="icon" viewBox="0 0 24 24">
                <path d="M12 2L2 7v6c0 5 3.8 9.4 10 11 6.2-1.6 10-6 10-11V7L12 2z"/>
            </svg>
            <div class="tile-title">Aanmelden stage</div>
        </a>

    </div>

</div>

<script>
/* Hover sound (subtle) */
const audio = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-select-click-1109.mp3");
audio.volume = 0.15;

document.querySelectorAll(".tile").forEach(tile=>{
    tile.addEventListener("mouseenter",()=>{
        audio.currentTime = 0;
        audio.play();
    });
});

/* Dynamic light */
const light=document.getElementById("light");
document.addEventListener("mousemove",e=>{
    light.style.left=e.clientX+"px";
    light.style.top=e.clientY+"px";
});

/* Ambient particles */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<80;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*2+0.5,
        d:Math.random()*0.4+0.2
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="rgba(255,255,255,0.2)";
    ctx.beginPath();
    particles.forEach(p=>{
        ctx.moveTo(p.x,p.y);
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2,true);
    });
    ctx.fill();
    particles.forEach(p=>{
        p.y+=p.d;
        if(p.y>canvas.height){p.y=0;p.x=Math.random()*canvas.width;}
    });
}
setInterval(draw,33);
</script>

</body>
</html>
